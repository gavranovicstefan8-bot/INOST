<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INOST CRIMINAL DATABASE V 1.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --maroon: #800000;
            --maroon-bright: #b30000;
            --suspect: #ff4d4d;
            --clear: #4d94ff;
            --bg: #050505;
            --panel: #111;
        }

        body {
            background-color: var(--bg);
            color: var(--maroon);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 400px;
            background: var(--panel);
            border-right: 2px solid var(--maroon);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar h2 { font-size: 1.1rem; text-align: center; border-bottom: 1px solid var(--maroon); padding-bottom: 15px; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: var(--maroon); }
        
        input, select, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 3px;
        }

        input:focus { border-color: var(--maroon-bright); outline: none; }
        
        /* Crveni okvir za pogrešnu lozinku */
        .auth-error { border: 2px solid var(--suspect) !important; box-shadow: 0 0 10px var(--suspect); }

        .upload-area {
            width: 100%;
            height: 100px;
            border: 2px dashed #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
        }

        .btn-submit {
            background: var(--maroon);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-submit:hover { background: var(--maroon-bright); }

        .main { flex-grow: 1; display: flex; flex-direction: column; background: #000; }
        .header { background: #000; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--maroon); }
        #clock { font-size: 1.2rem; color: #fff; background: var(--panel); padding: 5px 15px; border-left: 3px solid var(--maroon); }
        .list-container { padding: 30px; overflow-y: auto; flex-grow: 1; }

        .entry { background: #121212; border-left: 5px solid var(--maroon); margin-bottom: 15px; border-radius: 4px; }
        .entry-header { padding: 18px 25px; display: flex; justify-content: space-between; font-weight: bold; cursor: pointer; }
        .entry-body { max-height: 0; padding: 0 25px; overflow: hidden; transition: all 0.4s ease; background: #080808; }
        .entry.expanded .entry-body { max-height: 600px; padding: 25px; border-top: 1px solid #222; }

        .status-suspect { color: var(--suspect); }
        .status-clear { color: var(--clear); }

        .actions { margin-top: 15px; display: flex; gap: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .btn-action { background: none; border: 1px solid #444; color: #888; padding: 5px 10px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 id="form-title">TERMINAL UNOSA</h2>
    <input type="hidden" id="edit-id">
    
    <div class="input-group"><label>IME:</label><input type="text" id="ime" placeholder="..."></div>
    <div class="input-group"><label>PREZIME:</label><input type="text" id="prezime" placeholder="..."></div>
    <div class="input-group"><label>STATUS:</label>
        <select id="status">
            <option value="osumnjicen">OSUMNJICEN</option>
            <option value="nije_osumnjicen">NIJE OSUMNJICEN</option>
        </select>
    </div>
    
    <div class="input-group">
        <label style="color: #ff4d4d;">AUTORIZACIJA (Stefan / Anastasija / Stojana):</label>
        <input type="password" id="lozinka-polje" placeholder="Unesite lozinku ovdje...">
    </div>

    <div class="input-group">
        <label>BIOMETRIJA:</label>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div class="upload-text" id="file-info">Klikni za otisak</div>
            <input type="file" id="file-input" style="display: none;" accept="image/*">
        </div>
    </div>
    
    <button class="btn-submit" onclick="submitData()">ARHIVIRAJ U BAZU</button>
</div>

<div class="main">
    <div class="header">
        <h1>INOST CRIMINAL DATABASE V 1.1</h1>
        <div id="clock">00:00:00</div>
    </div>
    <div class="list-container" id="lista-dosijea"></div>
</div>

<script>
    let zapisi = JSON.parse(localStorage.getItem('krim_baza')) || [];
    let base64Image = "https://www.svgrepo.com/show/25771/fingerprint.svg";
    
    // VALIDNE LOZINKE
    const dozvoljeneLozinke = ["Stefan", "Anastasija", "Stojana"];

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

    document.getElementById('file-input').addEventListener('change', function(e) {
        if (e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                base64Image = ev.target.result; 
                document.getElementById('file-info').innerText = "Otisak ucitan"; 
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });

    function submitData() {
        const lozinkaInput = document.getElementById('lozinka-polje');
        const unesenaLozinka = lozinkaInput.value.trim();
        
        // 1. PROVJERA LOZINKE - KLJUCNI DIO
        if (!dozvoljeneLozinke.includes(unesenaLozinka)) {
            lozinkaInput.classList.add('auth-error');
            alert("PRISTUP ODBIJEN! Samo Stefan, Anastasija ili Stojana mogu arhivirati post.");
            return; // Ovako potpuno zaustavljamo funkciju
        }

        // 2. AKO JE LOZINKA TACNA, NASTAVI DALJE
        lozinkaInput.classList.remove('auth-error');

        const ime = document.getElementById('ime').value;
        const prezime = document.getElementById('prezime').value;

        if(!ime || !prezime) {
            alert("Unesite ime i prezime!");
            return;
        }

        const noviZapis = {
            id: document.getElementById('edit-id').value || Date.now().toString(),
            ime: ime,
            prezime: prezime,
            status: document.getElementById('status').value,
            otisak: base64Image,
            datum: new Date().toLocaleDateString()
        };

        const index = zapisi.findIndex(z => z.id === noviZapis.id);
        if(index > -1) zapisi[index] = noviZapis;
        else zapisi.unshift(noviZapis);

        localStorage.setItem('krim_baza', JSON.stringify(zapisi));
        
        // Cišcenje forme
        document.getElementById('ime').value = '';
        document.getElementById('prezime').value = '';
        lozinkaInput.value = '';
        
        renderList();
        alert("Podaci uspješno arhivirani!");
    }

    function renderList() {
        const container = document.getElementById('lista-dosijea');
        container.innerHTML = '';
        zapisi.forEach(z => {
            const card = document.createElement('div');
            card.className = 'entry';
            card.innerHTML = `
                <div class="entry-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <span>${z.ime.toUpperCase()} ${z.prezime.toUpperCase()}</span>
                    <span>[ STATUS: ${z.status.replace('_', ' ').toUpperCase()} ]</span>
                </div>
                <div class="entry-body">
                    <p>Datum arhiviranja: ${z.datum}</p>
                    <img src="${z.otisak}" style="width:50px; filter:invert(1);">
                </div>`;
            container.appendChild(card);
        });
    }

    renderList();
</script>
</body>
</html>
